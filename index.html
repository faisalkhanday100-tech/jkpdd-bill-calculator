```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>JKPDD Bill Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#f5f7fb;
padding:20px;
}

.container{

max-width:450px;
margin:auto;
}

.heading{

text-align:center;
margin-top:30px;
}

.heading h1{

font-size:42px;
line-height:1.2;
font-weight:800;
color:#0f172a;
}

.heading span{

color:#4f46e5;
}

.subtitle{

margin-top:20px;
font-size:20px;
line-height:1.8;
color:#6b7280;
text-align:center;
}

.card{

background:white;
margin-top:50px;
padding:30px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.06);
}

label{

display:block;
margin-top:20px;
margin-bottom:10px;
font-size:15px;
font-weight:700;
letter-spacing:1px;
color:#6b7280;
}

input,select{

width:100%;
padding:18px;
border-radius:18px;
border:1px solid #e5e7eb;
font-size:20px;
outline:none;
background:#fafafa;
}

button{

width:100%;
margin-top:35px;
padding:18px;
border:none;
border-radius:18px;
background:#4f46e5;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.result{

margin-top:30px;
background:#eef2ff;
padding:25px;
border-radius:18px;
line-height:2;
font-size:18px;
color:#111827;
}

.total{

margin-top:15px;
font-size:30px;
font-weight:800;
color:#4f46e5;
}

.breakdown{

margin-top:10px;
padding-top:10px;
border-top:1px solid #c7d2fe;
}

</style>

</head>

<body>

<div class="container">

<div class="heading">

<h1>
Estimate Your Monthly
<span>Electricity Bill Instantly.</span>
</h1>

<p class="subtitle">
The most accurate bill estimator for J&K smart meter consumers.
Fast, reliable, and updated with JKPDD Tariff.
</p>

</div>

<div class="card">

<label>UNITS CONSUMED</label>

<input
type="number"
id="units"
placeholder="e.g. 250">

<label>SANCTIONED LOAD (KW)</label>

<input
type="number"
id="load"
value="1">

<label>CONNECTION TYPE</label>

<select id="type">

<option>Domestic</option>
<option>Commercial</option>

</select>

<button onclick="calculateBill()">
CALCULATE BILL
</button>

<div class="result" id="result"
style="display:none;"></div>

</div>

</div>

<script>

function calculateBill(){

let units =
parseFloat(document.getElementById("units").value);

let load =
parseFloat(document.getElementById("load").value);

let type =
document.getElementById("type").value;

if(isNaN(units) || units <= 0){

alert("Please enter valid units");
return;

}

let energyCharge = 0;
let fixedCharge = load * 8;

let breakdown = "";

if(type == "Domestic"){

if(units <= 200){

energyCharge =
units * 2.30;

breakdown =

`
<div class="breakdown">

${units} × ₹2.30
= ₹${energyCharge.toFixed(2)}

</div>
`;

}

else if(units <= 400){

let first =
200 * 2.30;

let remaining =
(units - 200) * 4.00;

energyCharge =
first + remaining;

breakdown =

`
<div class="breakdown">

First 200 Units:

<br>

200 × ₹2.30
= ₹${first.toFixed(2)}

<br><br>

Remaining ${units-200} Units:

<br>

${units-200} × ₹4.00
= ₹${remaining.toFixed(2)}

</div>
`;

}

else{

let first =
200 * 2.30;

let second =
200 * 4.00;

let third =
(units - 400) * 4.35;

energyCharge =
first + second + third;

breakdown =

`
<div class="breakdown">

First 200 Units:

<br>

200 × ₹2.30
= ₹${first.toFixed(2)}

<br><br>

Next 200 Units:

<br>

200 × ₹4.00
= ₹${second.toFixed(2)}

<br><br>

Remaining ${units-400} Units:

<br>

${units-400} × ₹4.35
= ₹${third.toFixed(2)}

</div>
`;

}

}

let total =
energyCharge + fixedCharge;

document.getElementById("result").style.display =
"block";

document.getElementById("result").innerHTML =

`

<b>Units Consumed:</b>
${units}

<br><br>

${breakdown}

<br><br>

<b>Energy Charge:</b>
₹${energyCharge.toFixed(2)}

<br>

<b>Fixed Charge:</b>
₹${fixedCharge.toFixed(2)}

<div class="total">

Estimated Bill:
₹${total.toFixed(2)}

</div>

`;

}

</script>

</body>

</html>
```
